services:
  filaman:
    build:
      context: .
      dockerfile: Dockerfile
    image: filaman-system
    container_name: filaman-system-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3


networks:
  default:
    name: filaman-network

