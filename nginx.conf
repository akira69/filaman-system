worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging — stdout for Docker log collection
    access_log /dev/stdout;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1000;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    upstream backend {
        server 127.0.0.1:8001 fail_timeout=0;
    }

    server {
        listen 8000;
        server_name _;
        absolute_redirect off; 

        root /app/static;

        # ---------------------------------------------------------------
        # 1. Static assets — served directly by nginx, never touch Python
        # ---------------------------------------------------------------

        # Hashed Astro assets — cache forever
        location /_astro/ {
            expires max;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # Images
        location /img/ {
            expires max;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # All other static file types (fonts, icons, etc.)
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|webp|avif)$ {
            expires max;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # ---------------------------------------------------------------
        # 2. API / Auth / Health — always proxy to backend
        # ---------------------------------------------------------------

        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # SSE endpoint — disable buffering for real-time events
        location = /api/v1/events/stream {
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 86400s;
            chunked_transfer_encoding off;
        }

        location /auth/ {
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Plugin pages — served by backend (dynamic)
        location /plugin-page/ {
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SpoolmanAPI plugin mount prefix
        location /spoolman/ {
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---------------------------------------------------------------
        # 3. HTML pages — try static file first, fallback to backend
        # ---------------------------------------------------------------
        #    Covers both pre-rendered Astro pages AND dynamic SPA routes
        #    (e.g. /spools/123 → backend serves spools/detail/index.html)

        location / {
            try_files $uri $uri/ $uri/index.html @backend;
            add_header Cache-Control "no-cache";
        }

        # Named location — fallback for routes without a static file
        location @backend {
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
